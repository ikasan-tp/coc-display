<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKATOOLBOX | LOG EDITOR</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2250%%22 style=%22dominant-baseline:central;text-anchor:middle;font-size:80px;%22>🦑</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&family=Noto+Sans+JP:wght@400;500;700&family=Montserrat:wght@700;900&display=block" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #1a1a1a;
            --card-bg: #222222;
            --ui-input: #111111;
            --ui-border: #444444;
            --accent: #C5373C;
            --text-main: #dbdee1;
            --text-sub: #b5bac1;
        }

        .material-symbols-outlined {
            display: inline-block; width: 1em; height: 1em;
            overflow: hidden; white-space: nowrap;
            direction: ltr; vertical-align: middle;
        }

        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; padding: 80px 15px 120px;
            max-width: 1000px; margin: 0 auto;
            min-height: 100vh;
            box-sizing: border-box;
            line-height: 1.6;
        }

        .back-link {
            position: absolute; top: 30px; left: 20px;
            display: flex; align-items: center; gap: 8px;
            text-decoration: none; color: var(--text-sub);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem; font-weight: 700;
            letter-spacing: 0.1em; transition: 0.3s;
            z-index: 1000;
        }
        .back-link:hover { color: var(--accent); transform: translateX(-5px); }

        .card { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 12px; 
            border: 1px solid var(--ui-border);
            margin-bottom: 30px; 
        }

        .ui-header { text-align: left; margin-bottom: 25px; border-bottom: 3px solid var(--accent); padding-bottom: 12px; }
        .ui-brand { font-family: 'Montserrat', sans-serif; font-size: 0.7rem; font-weight: 900; color: var(--accent); letter-spacing: 0.4em; display: block; margin-bottom: 2px; }
        .ui-title { font-family: 'Montserrat', 'Noto Sans JP', sans-serif; font-size: 1.6rem; font-weight: 900; color: #fff; letter-spacing: 0.05em; display: flex; align-items: baseline; gap: 10px; }
        .ui-title-sub { color: var(--text-sub); font-size: 0.8rem; font-weight: 400; letter-spacing: 0.1em; }

        .file-input-area { 
            border: 2px dashed #4f545c; 
            padding: 40px 20px; 
            border-radius: 8px; 
            background: #313338; 
            cursor: pointer; transition: 0.3s; text-align: center;
        }
        .file-input-area:hover, .file-input-area.dragover { border-color: var(--accent); background: rgba(197, 55, 60, 0.05); }
        .file-label { color: var(--accent); text-decoration: underline; font-weight: bold; }

        /* ログ設定セクション */
        #logSettingsSection { background: #313338; padding: 25px; border-radius: 8px; margin-top: 30px; display: none; }
        .setting-group { margin-bottom: 20px; }
        .setting-label { font-size: 0.75rem; font-weight: bold; color: var(--accent); font-family: 'Montserrat'; letter-spacing: 0.1em; margin-bottom: 8px; display: block; }
        
        .log-title-input {
            width: 100%; background: var(--ui-input); border: 1px solid var(--ui-border); 
            padding: 12px; border-radius: 6px; color: #fff; font-size: 1rem; font-weight: bold; box-sizing: border-box;
        }

        .char-settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
        .char-conf { background: var(--ui-input); border: 1px solid var(--ui-border); padding: 10px; border-radius: 6px; display: flex; align-items: center; gap: 8px; }
        .char-conf input[type="text"] { flex: 1; background: transparent; border: none; color: #fff; font-size: 0.85rem; font-weight: bold; }
        .char-conf input[type="color"] { width: 22px; height: 22px; border: none; background: none; cursor: pointer; }

        .log-item { 
            background: var(--card-bg); border: 1px solid var(--ui-border); padding: 20px; border-radius: 8px;
            margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; transition: 0.2s;
        }
        .item-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
        .char-label { font-weight: bold; font-size: 0.95rem; }
        .tab-label { font-size: 0.65rem; color: #555; font-family: 'Montserrat'; font-weight: 700; }

        .content-area { 
            width: 100%; background: transparent; border: none; color: var(--text-main); 
            font-size: 1rem; line-height: 1.7; resize: none; font-family: inherit; 
            padding: 0; overflow: hidden; white-space: pre-wrap;
        }
        .content-area:focus { outline: none; }

        .item-actions { display: flex; gap: 15px; justify-content: flex-end; color: #555; padding-top: 5px; }
        .action-btn { background: transparent; border: none; color: inherit; cursor: pointer; display: flex; align-items: center; gap: 4px; font-size: 0.75rem; font-weight: bold; transition: 0.2s; }
        .action-btn:hover { color: var(--accent); }

        .footer-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); padding: 15px 0; border-top: 1px solid var(--ui-border); z-index: 1000; }
        .footer-inner { max-width: 1000px; margin: 0 auto; padding: 0 20px; display: flex; gap: 12px; }

        .btn { border: none; border-radius: 25px; cursor: pointer; font-weight: bold; font-family: 'Montserrat'; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .btn-main { background: var(--accent); color: white; flex: 2; padding: 12px; font-size: 0.9rem; letter-spacing: 0.1em; }
        .btn-sub { background: #333; color: white; flex: 1; padding: 12px; font-size: 0.8rem; }
        .btn:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">
        <span class="material-symbols-outlined" style="font-size: 1.2rem;">arrow_back_ios</span>
        BACK TO TOOLBOX
    </a>

    <div class="card">
        <div class="ui-header">
            <span class="ui-brand">IKATOOLBOX</span>
            <div class="ui-title">LOG EDITOR <span class="ui-title-sub">for CCFOLIA</span></div>
        </div>

        <div class="file-input-area" id="dropZone" onclick="document.getElementById('logFile').click()">
            <span class="material-symbols-outlined" style="font-size: 3rem; color: var(--accent); margin-bottom:10px;">upload_file</span>
            <p id="dropText" style="margin:0;">ログファイルをドロップするか<br><span class="file-label">ファイルを選択</span></p>
            <input type="file" id="logFile" accept=".html" style="display:none" onchange="processLog(this.files[0])">
        </div>

        <div id="logSettingsSection">
            <div class="setting-group">
                <span class="setting-label">LOG TITLE / FILENAME</span>
                <input type="text" id="logTitleInput" class="log-title-input" placeholder="ログのタイトルを入力">
            </div>
            <div class="setting-group" style="margin-bottom:0;">
                <span class="setting-label">CHARACTER SETTINGS</span>
                <div id="charGrid" class="char-settings-grid"></div>
            </div>
        </div>
    </div>

    <div id="logEditor"></div>

    <footer class="footer-bar" id="footerBar" style="display:none;">
        <div class="footer-inner">
            <button class="btn btn-sub" onclick="window.scrollTo({top:0, behavior:'smooth'})">TOP</button>
            <button class="btn btn-main" onclick="exportLog()">DOWNLOAD EDITED LOG</button>
        </div>
    </footer>

    <div style="position: fixed; bottom: 10px; right: 15px; font-family: Montserrat; font-size: 10px; color: rgba(255,255,255,0.1); letter-spacing: 0.1em; font-weight: 900; pointer-events: none; z-index: 9999;">✦ IKATOOLBOX</div>

<script>
    let logData = []; 
    let charSettings = {}; 

    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) processLog(e.dataTransfer.files[0]);
    });

    function rgbToHex(rgb) {
        if (!rgb || !rgb.startsWith('rgb')) return rgb || '#dbdee1';
        const match = rgb.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
        if (!match) return '#dbdee1';
        const r = parseInt(match[1]), g = parseInt(match[2]), b = parseInt(match[3]);
        return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
    }

    // 名前から安全なクラス名（セレクタ用）を生成
    function getSafeKey(name) {
        return 'char-' + btoa(encodeURIComponent(name)).replace(/=/g, '').replace(/\+/g, '').replace(/\//g, '');
    }

    async function processLog(file) {
        if (!file) return;
        
        // ファイル名からタイトルを設定（拡張子を除く）
        document.getElementById('logTitleInput').value = file.name.replace(/\.[^/.]+$/, "");

        const text = await file.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');
        const lines = doc.querySelectorAll('p');
        
        logData = [];
        charSettings = {};

        lines.forEach((p, index) => {
            const temp = document.createElement('div');
            temp.innerHTML = p.innerHTML;
            temp.querySelectorAll('br').forEach(br => br.replaceWith('\n'));
            
            const rawContent = temp.innerText.trim();
            const match = rawContent.match(/\[(.*?)\]\s*(.*?)\s*:\s*([\s\S]*)/);
            if (!match) return;

            const [_, tab, name, content] = match;
            if (content.includes('削除済') || content === '') return;

            let detectedColor = '#dbdee1'; 
            const spans = p.querySelectorAll('span');
            for (let s of spans) {
                if (s.style.color) {
                    detectedColor = rgbToHex(s.style.color);
                    break;
                }
            }

            const id = 'line-' + index;
            logData.push({ id, originalName: name, content: content, tab });
            if (!charSettings[name]) {
                charSettings[name] = { displayName: name, color: detectedColor };
            }
        });

        document.getElementById('logSettingsSection').style.display = 'block';
        document.getElementById('footerBar').style.display = 'flex';
        renderCharConfigs();
        renderEditor();
    }

    function renderCharConfigs() {
        const grid = document.getElementById('charGrid');
        grid.innerHTML = '';
        Object.keys(charSettings).forEach(key => {
            const div = document.createElement('div');
            div.className = 'char-conf';
            div.innerHTML = `
                <input type="color" value="${charSettings[key].color}" onchange="updateCharColor('${key}', this.value)">
                <input type="text" value="${charSettings[key].displayName}" oninput="updateCharName('${key}', this.value)">
            `;
            grid.appendChild(div);
        });
    }

    function updateCharName(key, newName) {
        charSettings[key].displayName = newName;
        const safeKey = getSafeKey(key);
        document.querySelectorAll(`.${safeKey}`).forEach(el => el.innerText = newName);
    }

    function updateCharColor(key, newColor) {
        charSettings[key].color = newColor;
        const safeKey = getSafeKey(key);
        document.querySelectorAll(`.${safeKey}`).forEach(el => el.style.color = newColor);
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    function renderEditor() {
        const container = document.getElementById('logEditor');
        container.innerHTML = '';

        logData.forEach((item, index) => {
            const settings = charSettings[item.originalName];
            const safeKey = getSafeKey(item.originalName);
            
            const card = document.createElement('div');
            card.className = 'log-item';
            card.id = item.id;
            card.innerHTML = `
                <div class="item-header">
                    <span class="char-label ${safeKey}" style="color:${settings.color}">${settings.displayName}</span>
                    <span class="tab-label">${item.tab}</span>
                </div>
                <textarea class="content-area" oninput="logData[${index}].content = this.value; autoResize(this)">${item.content}</textarea>
                <div class="item-actions">
                    <button class="action-btn" onclick="moveItem(${index}, -1)"><span class="material-symbols-outlined">expand_less</span></button>
                    <button class="action-btn" onclick="moveItem(${index}, 1)"><span class="material-symbols-outlined">expand_more</span></button>
                    <button class="action-btn" onclick="mergeNext(${index})" style="color:#4a86ff;"><span class="material-symbols-outlined">join_inner</span>結合</button>
                    <button class="action-btn" onclick="deleteItem(${index})"><span class="material-symbols-outlined">delete</span></button>
                </div>
            `;
            container.appendChild(card);
            autoResize(card.querySelector('textarea'));
        });
    }

    function mergeNext(index) {
        if (index + 1 >= logData.length) return;
        logData[index].content += '\n' + logData[index + 1].content;
        logData.splice(index + 1, 1);
        renderEditor();
    }

    function moveItem(index, direction) {
        const to = index + direction;
        if (to < 0 || to >= logData.length) return;
        [logData[index], logData[to]] = [logData[to], logData[index]];
        renderEditor();
        document.getElementById(logData[to].id).scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function deleteItem(index) {
        if(!confirm('削除しますか？')) return;
        logData.splice(index, 1);
        renderEditor();
    }

    function exportLog() {
        const title = document.getElementById('logTitleInput').value || 'Exported_Log';
        // ここで logData と charSettings を使って HTML を構築
        alert(title + '.html として保存する処理を続行します。');
    }
</script>
</body>
</html>
