<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKATOOLBOX | LOG EDITOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        :root { --accent: #C5373C; --bg: #050505; --card: #151515; --border: #333; --input-bg: #000; }
        
        body { background: var(--bg); color: #eee; font-family: 'Noto Sans JP', sans-serif; margin: 0; display: block; overflow-y: scroll; scroll-behavior: smooth; }

        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px 100px; }

        .ui-header { border-bottom: 2px solid var(--accent); margin-bottom: 40px; padding-bottom: 15px; text-align: center; }
        .ui-brand { font-family: 'Montserrat'; font-size: 0.7rem; font-weight: 900; color: var(--accent); letter-spacing: 0.4em; }
        .ui-title { font-family: 'Montserrat'; font-weight: 900; font-size: 2rem; color: #fff; margin: 5px 0; }

        .top-controls { 
            background: var(--card); border: 2px dashed var(--border); padding: 40px 25px; border-radius: 12px; margin-bottom: 30px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px;
            transition: 0.3s; cursor: pointer;
        }
        .top-controls.dragover { border-color: var(--accent); background: rgba(197, 55, 60, 0.05); }
        
        .char-settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-top: 20px; width: 100%; }
        .char-conf { background: var(--input-bg); border: 1px solid var(--border); padding: 10px; border-radius: 6px; display: flex; align-items: center; gap: 8px; }
        .char-conf input[type="text"] { flex: 1; background: transparent; border: none; color: #fff; font-size: 0.8rem; font-weight: bold; }
        .char-conf input[type="color"] { width: 24px; height: 24px; border: none; background: none; cursor: pointer; }

        .log-item { 
            background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px;
            margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; transition: 0.2s; position: relative;
        }
        .log-item:hover { border-color: #555; }
        
        .item-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
        .char-label { font-weight: bold; font-size: 0.95rem; }
        
        .content-area { 
            width: 100%; background: transparent; border: none; color: #ccc; 
            font-size: 1rem; line-height: 1.6; resize: none; font-family: inherit; 
            padding: 0; overflow: hidden;
        }
        .content-area:focus { outline: none; color: #fff; }

        .item-actions { display: flex; gap: 15px; justify-content: flex-end; color: #666; padding-top: 5px; }
        .action-btn { background: transparent; border: none; color: inherit; cursor: pointer; display: flex; align-items: center; gap: 4px; font-size: 0.75rem; font-weight: bold; transition: 0.2s; }
        .action-btn:hover { color: var(--accent); }
        .action-btn.merge { color: #5588ff; }

        .footer-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); padding: 15px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .footer-inner { max-width: 800px; margin: 0 auto; padding: 0 20px; display: flex; gap: 10px; }

        .btn { border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-family: 'Montserrat'; transition: 0.3s; }
        .btn-main { background: var(--accent); color: white; flex: 1; padding: 15px; font-size: 1rem; letter-spacing: 0.2em; }
        .btn-sub { background: #333; color: white; padding: 0 20px; }
    </style>
</head>
<body>

<div class="container">
    <header class="ui-header">
        <span class="ui-brand">IKATOOLBOX</span>
        <h1 class="ui-title">LOG EDITOR</h1>
        <p style="font-size:0.75rem; color:#666;">ココフォリアのログを読みやすく、美しく。</p>
    </header>

    <section class="top-controls" id="dropZone" onclick="document.getElementById('logFile').click()">
        <span class="material-symbols-outlined" style="font-size: 3rem; color: var(--accent);">upload_file</span>
        <p style="margin: 0; font-weight: bold; letter-spacing: 0.1em; color: #aaa;">DROP FILE OR CLICK TO IMPORT</p>
        <input type="file" id="logFile" accept=".html" style="display:none" onchange="processLog(this.files[0])">

        <div id="character-settings-area" style="display:none; width: 100%;" onclick="event.stopPropagation()">
            <h2 style="font-size:0.7rem; color:var(--accent); letter-spacing:0.1em; margin-bottom:10px; border-top: 1px solid #333; padding-top: 20px;">GLOBAL CHARACTER SETTINGS</h2>
            <div id="charGrid" class="char-settings-grid"></div>
        </div>
    </section>

    <div id="logEditor" class="log-container"></div>
</div>

<footer class="footer-bar" id="footerBar" style="display:none;">
    <div class="footer-inner">
        <button class="btn btn-sub" onclick="window.scrollTo({top:0, behavior:'smooth'})">TOP</button>
        <button class="btn btn-main" onclick="exportLog()">DOWNLOAD EDITED LOG</button>
    </div>
</footer>

<script>
    let logData = []; 
    let charSettings = {}; 

    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) processLog(e.dataTransfer.files[0]);
    });

    function rgbToHex(rgb) {
        if (!rgb) return '#C5373C';
        if (rgb.startsWith('#')) return rgb;
        const match = rgb.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
        if (!match) return '#C5373C';
        const r = parseInt(match[1]);
        const g = parseInt(match[2]);
        const b = parseInt(match[3]);
        return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
    }

    async function processLog(file) {
        if (!file) return;
        const text = await file.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');
        const lines = doc.querySelectorAll('p');
        
        logData = [];
        charSettings = {};

        lines.forEach((p, index) => {
            const raw = p.innerText.trim();
            const match = raw.match(/\[(.*?)\]\s*(.*?)\s*:\s*(.*)/);
            if (!match) return;

            const [_, tab, name, content] = match;
            if (content.includes('削除済') || content === '') return;

            // 文字色の抽出
            let detectedColor = '#C5373C';
            const spans = p.querySelectorAll('span');
            if (spans.length > 0) {
                // 通常ココフォリアのログでは、名前が2番目以降のspanにあることが多い
                // 全てのspanからstyle属性のcolorを探す
                for (let s of spans) {
                    if (s.style.color) {
                        detectedColor = rgbToHex(s.style.color);
                        break;
                    }
                }
            }

            const id = 'line-' + index;
            logData.push({ id, originalName: name, content: content, tab });
            if (!charSettings[name]) {
                charSettings[name] = { displayName: name, color: detectedColor };
            }
        });

        document.getElementById('character-settings-area').style.display = 'block';
        document.getElementById('footerBar').style.display = 'block';
        renderCharConfigs();
        renderEditor();
    }

    function renderCharConfigs() {
        const grid = document.getElementById('charGrid');
        grid.innerHTML = '';
        Object.keys(charSettings).forEach(key => {
            const div = document.createElement('div');
            div.className = 'char-conf';
            div.innerHTML = `
                <input type="color" value="${charSettings[key].color}" onchange="updateCharColor('${key}', this.value)">
                <input type="text" value="${charSettings[key].displayName}" oninput="updateCharName('${key}', this.value)">
            `;
            grid.appendChild(div);
        });
    }

    function updateCharName(key, newName) {
        charSettings[key].displayName = newName;
        const safeKey = btoa(encodeURIComponent(key)).replace(/=/g, '');
        document.querySelectorAll(`.name-${safeKey}`).forEach(el => el.innerText = newName);
    }

    function updateCharColor(key, newColor) {
        charSettings[key].color = newColor;
        const safeKey = btoa(encodeURIComponent(key)).replace(/=/g, '');
        document.querySelectorAll(`.name-${safeKey}`).forEach(el => el.style.color = newColor);
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    function renderEditor() {
        const container = document.getElementById('logEditor');
        container.innerHTML = '';

        logData.forEach((item, index) => {
            const settings = charSettings[item.originalName];
            const safeKey = btoa(encodeURIComponent(item.originalName)).replace(/=/g, '');
            
            const card = document.createElement('div');
            card.className = 'log-item';
            card.id = item.id;
            card.innerHTML = `
                <div class="item-header">
                    <span class="char-label name-${safeKey}" style="color:${settings.color}">${settings.displayName}</span>
                    <span style="font-size:0.6rem; color:#444;">${item.tab}</span>
                </div>
                <textarea class="content-area" oninput="logData[${index}].content = this.value; autoResize(this)">${item.content}</textarea>
                <div class="item-actions">
                    <button class="action-btn" onclick="moveItem(${index}, -1)"><span class="material-symbols-outlined" style="font-size:1rem;">arrow_upward</span></button>
                    <button class="action-btn" onclick="moveItem(${index}, 1)"><span class="material-symbols-outlined" style="font-size:1rem;">arrow_downward</span></button>
                    <button class="action-btn merge" onclick="mergeNext(${index})"><span class="material-symbols-outlined" style="font-size:1rem;">expand_more</span>下の発言を結合</button>
                    <button class="action-btn" onclick="deleteItem(${index})"><span class="material-symbols-outlined" style="font-size:1rem;">delete</span>削除</button>
                </div>
            `;
            container.appendChild(card);
            autoResize(card.querySelector('textarea'));
        });
    }

    function mergeNext(index) {
        if (index + 1 >= logData.length) return;
        logData[index].content += '\n' + logData[index + 1].content;
        logData.splice(index + 1, 1);
        renderEditor();
    }

    function moveItem(index, direction) {
        const to = index + direction;
        if (to < 0 || to >= logData.length) return;
        [logData[index], logData[to]] = [logData[to], logData[index]];
        renderEditor();
        document.getElementById(logData[to].id).scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function deleteItem(index) {
        logData.splice(index, 1);
        renderEditor();
    }

    function exportLog() {
        alert('出力用HTMLの生成準備が整いました。');
    }
</script>

</body>
</html>
