<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IKATOOLBOX | Log Converter</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦑</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&family=Montserrat:wght@700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent-color: #C5373C; --bg-rgb: 5, 5, 5; --bg-color: #050505; 
            --text-color: #ffffff; --sub-text-color: #888888; --border-color: rgba(255,255,255,0.1);
            --ui-accent: #C5373C; --ui-bg: #222222; --ui-input: #111111; --ui-border: #444444;
        }

        body { background: #1a1a1a; color: #eee; margin: 0; display: flex; font-family: 'Montserrat', 'Noto Sans JP', sans-serif; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { 
            width: 420px; background: var(--ui-bg); border-right: 1px solid var(--ui-border); 
            flex-shrink: 0; display: flex; flex-direction: column; 
            transition: transform 0.3s ease; z-index: 2000;
        }
        .sidebar-scroll { flex: 1; overflow-y: auto; padding: 25px 20px; }

        .ui-header { margin-bottom: 30px; border-bottom: 2px solid var(--ui-accent); padding-bottom: 15px; }
        .ui-brand { font-size: 0.7rem; font-weight: 900; color: var(--ui-accent); letter-spacing: 0.4em; display: block; margin-bottom: 2px; }
        .ui-title { font-size: 1.4rem; font-weight: 900; color: #fff; letter-spacing: 0.05em; display: flex; align-items: center; gap: 8px; }

        .control-group { margin-bottom: 20px; }
        h2 { font-size: 0.75rem; color: #aaa; margin-bottom: 12px; letter-spacing: 0.05em; font-weight: 700; text-transform: uppercase; border-left: 3px solid var(--ui-accent); padding-left: 8px; }
        label { display: block; font-size: 0.65rem; margin-bottom: 4px; color: #777; font-weight: bold; }
        
        /* Accordion */
        details.ui-accordion { background: var(--ui-input); border: 1px solid var(--ui-border); border-radius: 4px; margin-bottom: 8px; }
        details.ui-accordion summary { padding: 12px; font-size: 0.75rem; font-weight: bold; cursor: pointer; list-style: none; display: flex; align-items: center; gap: 8px; }
        details.ui-accordion summary::-webkit-details-marker { display: none; }
        details.ui-accordion[open] summary { border-bottom: 1px solid var(--ui-border); color: var(--ui-accent); }
        .accordion-content { padding: 15px; }

        input[type="text"], input[type="color"], select { 
            width: 100%; background: #000; border: 1px solid var(--ui-border); 
            color: #fff; padding: 8px; border-radius: 4px; font-size: 0.8rem; box-sizing: border-box; margin-bottom: 10px;
        }

        .action-btn { 
            width: 100%; padding: 12px; background: #333; color: white; border: none; 
            border-radius: 4px; font-weight: 700; font-size: 0.8rem; cursor: pointer; 
            transition: 0.3s; letter-spacing: 0.1em; margin-bottom: 10px;
        }
        .action-btn:hover { background: #444; border-color: var(--ui-accent); }
        
        .save-btn { 
            width: 100%; padding: 18px; background: var(--ui-accent); color: white; 
            border: none; border-radius: 4px; font-weight: 900; font-size: 1rem; 
            cursor: pointer; margin-top: 10px; transition: 0.3s; letter-spacing: 0.2em; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }

        /* Preview Area */
        .preview-area { flex: 1; display: flex; flex-direction: column; background: #151515; position: relative; overflow: hidden; }
        .preview-header { padding: 15px 25px; background: #0c0c0c; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .preview-label { font-size: 0.7rem; font-weight: 900; color: var(--sub-text-color); letter-spacing: 0.2em; }
        
        #log-preview { flex: 1; padding: 40px; overflow-y: auto; background: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; gap: 5px; }
        .log-line { padding: 4px 10px; font-size: 0.9rem; line-height: 1.5; border-radius: 4px; }
        .log-line .name { font-weight: bold; margin-right: 10px; color: var(--accent-color); }
        
        .mobile-menu-btn {
            position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; border-radius: 50%;
            background: var(--ui-accent); color: white; display: none; align-items: center; justify-content: center;
            border: none; z-index: 3000; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        @media screen and (max-width: 1024px) {
            .mobile-menu-btn { display: flex; }
            .sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 100vw; transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
        }
    </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-scroll">
        <header class="ui-header">
            <span class="ui-brand">IKATOOLBOX</span>
            <h1 class="ui-title">LOG TOOL</h1>
        </header>

        <section class="control-group">
            <h2>1. Import</h2>
            <input type="file" id="logFile" accept=".html" style="display:none;" onchange="handleFile(this.files[0])">
            <button class="action-btn" onclick="document.getElementById('logFile').click()">SELECT LOG FILE</button>
            <div id="fileInfo" style="font-size:0.65rem; color:var(--sub-text-color); text-align:center;"></div>
        </section>

        <section class="control-group" id="editor-section" style="display:none;">
            <h2>2. Edit & Organize</h2>
            
            <details class="ui-accordion" open>
                <summary><span class="material-symbols-outlined">person</span> Rename & Color</summary>
                <div class="accordion-content">
                    <label>Target Character</label>
                    <select id="charSelector" onchange="loadCharSettings()"></select>
                    <label>New Name</label>
                    <input type="text" id="newName" placeholder="名前を変更">
                    <label>Color</label>
                    <input type="color" id="newColor" value="#C5373C">
                    <button class="action-btn" onclick="applyCharSettings()" style="background:var(--ui-accent);">APPLY TO PREVIEW</button>
                </div>
            </details>

            <details class="ui-accordion">
                <summary><span class="material-symbols-outlined">tabs</span> Tab Filtering</summary>
                <div class="accordion-content" id="tabFilterList">
                    </div>
            </details>
        </section>

        <section class="control-group">
            <button class="action-btn" onclick="scrollToPreview()" style="background:transparent; border:1px solid #444;">VIEW PREVIEW</button>
            <button class="save-btn" onclick="downloadModifiedLog()">SAVE CLEANED LOG</button>
        </section>
    </div>
</aside>

<main class="preview-area">
    <div class="preview-header">
        <span class="preview-label">LIVE PREVIEW</span>
        <span id="statusText" style="font-size:0.7rem; color:var(--accent-color);">WAITING FOR FILE...</span>
    </div>
    <div id="log-preview">
        </div>
</main>

<button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('active')">
    <span class="material-symbols-outlined">menu</span>
</button>

<script>
    let originalDoc = null;
    let characters = {};

    function handleFile(file) {
        if (!file) return;
        document.getElementById('fileInfo').innerText = file.name;
        const reader = new FileReader();
        reader.onload = (e) => {
            const parser = new DOMParser();
            originalDoc = parser.parseFromString(e.target.result, 'text/html');
            initEditor();
        };
        reader.readAsText(file, 'UTF-8');
    }

    function initEditor() {
        characters = {};
        const charSelector = document.getElementById('charSelector');
        charSelector.innerHTML = '';
        
        const ps = originalDoc.querySelectorAll('p');
        ps.forEach(p => {
            const rawText = p.innerText;
            const m = rawText.match(/\[(.*?)\]\s*(.*?)\s*:/);
            if (m && m[2]) {
                const name = m[2].trim();
                if (!characters[name]) {
                    characters[name] = { name: name, color: '#C5373C' };
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = name;
                    charSelector.appendChild(opt);
                }
            }
        });

        document.getElementById('editor-section').style.display = 'block';
        document.getElementById('statusText').innerText = 'LOG LOADED';
        renderPreview();
    }

    function renderPreview() {
        const preview = document.getElementById('log-preview');
        preview.innerHTML = '';
        if (!originalDoc) return;

        const ps = originalDoc.querySelectorAll('p');
        ps.forEach(p => {
            const text = p.innerText;
            if (text.includes('削除済') || text.trim() === '') return;

            const div = document.createElement('div');
            div.className = 'log-line';
            
            // 簡単なパース処理
            const m = text.match(/\[(.*?)\]\s*(.*?)\s*:\s*(.*)/);
            if (m) {
                const tab = m[1];
                const name = m[2].trim();
                const content = m[3];
                const settings = characters[name] || { name: name, color: '#ffffff' };
                
                div.innerHTML = `<span style="color:#888; font-size:0.7rem;">[${tab}]</span> 
                                 <span class="name" style="color:${settings.color}">${settings.name}</span>
                                 <span class="msg">${content}</span>`;
            } else {
                div.textContent = text;
            }
            preview.appendChild(div);
        });
    }

    function loadCharSettings() {
        const name = document.getElementById('charSelector').value;
        document.getElementById('newName').value = characters[name].name;
        document.getElementById('newColor').value = characters[name].color;
    }

    function applyCharSettings() {
        const target = document.getElementById('charSelector').value;
        characters[target].name = document.getElementById('newName').value;
        characters[target].color = document.getElementById('newColor').value;
        renderPreview();
    }

    function scrollToPreview() {
        document.getElementById('log-preview').scrollIntoView({ behavior: 'smooth' });
        document.getElementById('sidebar').classList.remove('active');
    }

    function downloadModifiedLog() {
        // プレビューの内容をHTMLとして書き出す処理（簡易版）
        const content = document.getElementById('log-preview').innerHTML;
        const blob = new Blob([content], {type: 'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "ikatoobox_log.html";
        a.click();
    }
</script>

</body>
</html>
